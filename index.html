<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldPaint - Desenhe no Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="topbar">
    <h1>WorldPaint</h1>
    <div id="auth-area">
      <button id="btn-login">Login</button>
      <button id="btn-register">Registrar</button>
      <span id="user-info" style="display:none">
        <span id="username-display"></span>
        <button id="btn-logout">Sair</button>
      </span>
    </div>
  </div>

  <div id="map"></div>

  <div id="setup-modal" class="modal" style="display:none">
    <div class="modal-content" style="max-width:460px">
      <h2>Configurar WorldPaint</h2>
      <p style="margin-bottom:16px;color:#aaa;font-size:14px">
        Informe seu token do GitHub e o reposit&oacute;rio onde os dados ser&atilde;o armazenados.
      </p>
      <div id="setup-form" style="display:flex;flex-direction:column;gap:12px">
        <input type="text" id="setup-token" placeholder="GitHub Personal Access Token" style="padding:10px 14px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.06);color:#eee;font-size:14px;outline:none;font-family:monospace">
        <div style="display:flex;gap:8px">
          <input type="text" id="setup-owner" placeholder="Owner (usuário)" style="flex:1;padding:10px 14px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.06);color:#eee;font-size:14px;outline:none">
          <input type="text" id="setup-repo" placeholder="Repositório" style="flex:1;padding:10px 14px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.06);color:#eee;font-size:14px;outline:none">
        </div>
        <button id="setup-btn-save" style="padding:10px;border:none;border-radius:8px;background:linear-gradient(135deg,#ff6b6b,#ffa502);color:#fff;font-size:15px;font-weight:700;cursor:pointer">Salvar</button>
      </div>
    </div>
  </div>

  <div id="instructions">Clique no mapa para desenhar!</div>
  <div class="toast" id="toast"></div>

  <div class="modal" id="auth-modal" style="display:none">
    <div class="modal-content">
      <span class="close" id="auth-modal-close">&times;</span>
      <h2 id="auth-modal-title">Login</h2>
      <form id="auth-form" data-mode="login">
        <input type="text" id="auth-username" placeholder="Nome de usuário" required autocomplete="username">
        <input type="password" id="auth-password" placeholder="Senha" required autocomplete="current-password">
        <button type="submit" id="auth-submit-btn">Entrar</button>
      </form>
    </div>
  </div>

  <div class="modal" id="drawing-modal" style="display:none">
    <div class="modal-content drawing-content">
      <span class="close" id="drawing-modal-close">&times;</span>
      <h2 id="drawing-coords">Desenhar</h2>
      <div class="drawing-area">
        <canvas id="drawing-canvas" width="200" height="200"></canvas>
        <div class="drawing-tools">
          <div class="tool-group">
            <label>Modo</label>
            <div style="display:flex;gap:4px">
              <button class="tool-btn active" data-mode="freehand">Rabisco</button>
              <button class="tool-btn" data-mode="pixel">Pixel</button>
            </div>
          </div>
          <div class="tool-group">
            <label>Cor</label>
            <input type="color" id="color-picker" value="#ff0000">
          </div>
          <div class="tool-group">
            <label>Tamanho: <span id="brush-label">3</span></label>
            <input type="range" id="brush-size" min="1" max="20" value="3">
          </div>
          <div class="tool-group">
            <label>
              <input type="checkbox" id="eraser-mode"> Borracha
            </label>
          </div>
          <button id="clear-canvas">Limpar tudo</button>
          <div class="actions">
            <button id="save-drawing" class="btn-primary">Salvar</button>
            <button id="cancel-drawing">Cancelar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="config.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
